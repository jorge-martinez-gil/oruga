# Example ORUGA run configuration.
# Run with:  oruga optimize --config examples/config.example.yaml --text "..."
# or load in Python: OrugaConfig.from_file("examples/config.example.yaml")

# --- problem ---
provider: wordnet            # dictionary | wordnet | word2vec | web
provider_kwargs: {}
metric: fkgl                 # fkgl | flesch | smog | coleman_liau | ari | gunning_fog
readability_backend: builtin # builtin | textstat | readability-metrics

modification: true           # add the "words replaced" objective (bi-objective)
modification_mode: active    # active | changes | rate
semantic: true               # add the semantic-distance objective (tri-objective)
semantic_backend: jaccard    # jaccard (no deps) | wmd (needs gensim)

# --- encoding heuristics ---
min_length: 4
skip_capitalized: true
skip_suffixes: []
lower_bound: -4.0
upper_bound: 4.0

# --- optimizer ---
optimizer: nsga2             # random | ga | jaya | cuckoo | tlbo | pygad | nsga2 | gde3 | smpso
optimizer_kwargs:
  max_evaluations: 3000
seed: 0

# --- post-processing ---
correct_grammar: false       # run LanguageTool over the result (needs Java)
